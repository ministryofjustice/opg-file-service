---
services:
  file-service:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/sirius/file-service:latest
    build:
      dockerfile: docker/file-service/Dockerfile
    healthcheck:
      test: [ "CMD", "/go/bin/zipper", "-hc" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - 8000:8000
    env_file:
      - docker-compose.env

  localstack:
    image: localstack/localstack:4.14.0@sha256:3ebc37595918b8accb852f8048fef2aff047d465167edd655528065b07bc364a
    environment:
      AWS_DEFAULT_REGION: eu-west-1
      HOSTNAME_EXTERNAL: localstack
      SERVICES: s3,dynamodb,secretsmanager
      DEBUG: 1
    ports:
      - 4566:4566
    volumes:
      - "./scripts/localstack:/etc/localstack/init/ready.d"

  swagger-ui:
    image: swaggerapi/swagger-ui@sha256:135a9ced4005a947bbb1757bc509309d88519d985aa0f5616f4fdfab1eba6ff6
    environment:
      SWAGGER_JSON: /tmp/openapi.yml
    volumes:
      - ./docs/openapi/openapi.yml:/tmp/openapi.yml
    ports:
      - 8383:8080

  swagger-generate:
    image: quay.io/goswagger/swagger@sha256:e4e89fcb84027a313d8d315a32cecaf2da76e2d8efb9546124082021b6e74389
    environment:
      GO111MODULE: "off"
      GOPATH: /go
    volumes:
      - ./:/go/src
    working_dir: /go/src
    entrypoint: [ "swagger", "generate", "spec", "-o", "/go/src/docs/openapi/openapi.yml", "--scan-models" ]

  test-runner:
    depends_on:
      - localstack
    build:
      dockerfile: docker/test-runner/Dockerfile
    command: gotestsum --junitfile test-results/unit-tests.xml -- ./... -coverprofile=test-results/test-coverage.txt
    env_file:
      - docker-compose.env
    working_dir: /go/src/app
    volumes:
      - ./:/go/src/app
      - ./.gocache:/go/pkg/mod

  go-lint:
    image: golangci/golangci-lint:v2.12.2@sha256:5cceeef04e53efe1470638d4b4b4f5ceefd574955ab3941b2d9a68a8c9ad5240
    working_dir: /go/src/app
    volumes:
      - ./:/go/src/app
      - ./.cache/golangci-lint/v2.2.1:/root/.cache
    command: golangci-lint run -v --timeout 5m

  gosec:
    image: securego/gosec:latest@sha256:2cf71ea78210c496c65e3a987576a9c8317b68e20f2960520b3f6f8f9f539be5
    working_dir: /app
    volumes:
      - .:/app
    command: -exclude-dir=.gocache -exclude-generated -fmt=sarif -out=/app/test-results/gosec.sarif -stdout -verbose=text /app/...
